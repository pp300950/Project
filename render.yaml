services:
  - type: web
    name: health-monitor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: health-monitor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ESP_API_KEY
        value: change-this-to-your-esp-secret

databases:
  - name: health-monitor-db
    databaseName: healthmonitor
    user: healthuser
    plan: free
